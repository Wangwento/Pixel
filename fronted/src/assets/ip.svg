<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Pixel X Icon">	<!--      3x3 grid:      [■ □ ■]      [□ ■ □]      [■ □ ■]    -->	<g fill="#FFFFFF">		<!-- size=28, gap=10, start=16  => total: 16 + (28+10)*3 -10 +16 = 128 -->		<rect x="16"  y="16"  width="28" height="28" rx="6"/>		<rect x="84"  y="16"  width="28" height="28" rx="6"/>		<rect x="50"  y="50"  width="28" height="28" rx="6"/>		<rect x="16"  y="84"  width="28" height="28" rx="6"/>		<rect x="84"  y="84"  width="28" height="28" rx="6"/>	</g></svg>